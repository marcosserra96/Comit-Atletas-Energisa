<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso | Comitê Atletas Energisa ⚡️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="toastContainer"></div>

  <div class="container">
    <div class="logo">
      <img src="assets/logo-energisa-branca.svg" alt="Energisa Logo" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<span style=\'font-weight:bold; font-size:1.5rem; color:white;\'>⚡️ Atletas Energisa</span>')" />
      <h1>Portal Atletas Energisa</h1>
    </div>

    <div class="login-box">
      <h2>Acesse sua conta</h2>
      <input type="email" id="email" placeholder="E-mail" required />
      <input type="password" id="password" placeholder="Senha" required />
      
      <button id="loginBtn">Entrar</button>

      <p class="register-text">
        Ainda não faz parte do time? <a href="#" id="showRegister">Solicite acesso</a>
      </p>
    </div>
  </div>

  <div id="registerModal" class="modal">
    <div class="modal-content">
      <span id="closeModal">&times;</span>
      <h2>Solicitar Acesso</h2>
      <p style="font-size: 0.85rem; color: #666; text-align: center; margin-bottom: 15px;">
        Seu cadastro passará pela aprovação do comitê.
      </p>

      <input type="text" id="nameRegister" placeholder="Nome completo" required />
      <input type="email" id="emailRegister" placeholder="E-mail" required />
      <input type="password" id="passwordRegister" placeholder="Crie uma senha" required />

      <div class="team-options">
        <label>Escolha sua modalidade principal:</label>
        <div class="team-buttons">
          <button class="team-btn" data-value="bike">🚴 Bike</button>
          <button class="team-btn" data-value="corrida">🏃 Corrida</button>
        </div>
      </div>

      <input type="hidden" id="teamRegister" />
      <button id="registerBtn">Enviar Solicitação</button>
    </div>
  </div>

  <script type="module" src="js/login.js" defer></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const modal = document.getElementById("registerModal");
      const teamButtons = document.querySelectorAll(".team-btn");
      
      document.getElementById("showRegister").addEventListener("click", (e) => {
        e.preventDefault();
        modal.style.display = "flex";
      });

      document.getElementById("closeModal").addEventListener("click", () => {
        modal.style.display = "none";
      });

      teamButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          teamButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById("teamRegister").value = btn.getAttribute("data-value");
        });
      });
    });
  </script>
</body>
</html>
